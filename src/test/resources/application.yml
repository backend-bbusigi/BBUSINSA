spring:
  datasource:
      url: jdbc:h2:mem:test
      driverClassName: org.h2.Driver
      username: sa
      password:
  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    hibernate:
      ddl-auto: create-drop
  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 3000
